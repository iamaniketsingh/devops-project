name : Build and Push Docker Image

on: 
 push: 
  branches:
    - main

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/${{ github.event.repository.name }}

jobs:
  docker-build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses : docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
           ${{env.IMAGE_NAME}}:${{ github.run_number }}
           ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Checkout GitOps Repository
        uses: actions/checkout@v4
        with:
          repository: iamaniketsingh/k8s-gitops-repo
          token: ${{ secrets.GH_TOKEN }}
          path: gitops-repo

      - name: Update Image tag in deployment
        env:
          IMAGE_TAG: ${{ github.run_number }}
        run: |
          cd gitops-repo

          yq e '
          .spec.template.spec.containers[0].image = strenv(IMAGE_NAME) + ":" + strenv(IMAGE_TAG)
          ' --inplace k8s/deployment.yaml

          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add k8s/deployment.yaml
          git commit -m "Update image tag to ${{ github.run_number }}"
          git push
          
           
